name: Container Images

on:
  workflow_dispatch:
    inputs:
      push:
        description: "Push images to registry"
        required: false
        type: boolean
        default: false
      debug_enabled:
        description: "Enable tmate debug session"
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      push:
        description: "Push images to registry"
        required: false
        type: boolean
        default: true

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read
  packages: write

env:
  CACHIX_BINARY_CACHE: cameronraysmith

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      container-names: ${{ steps.matrix.outputs.names }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          system: x86_64-linux
          enable-cachix: true
          cachix-name: ${{ env.CACHIX_BINARY_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix-skip-push: true

      - name: Discover container matrix from Nix
        id: matrix
        run: |
          echo "Evaluating containerMatrix from flake..."
          RAW=$(nix eval '.#legacyPackages.x86_64-linux.containerMatrix' --json)
          echo "Raw matrix: $RAW"

          # Extract container names for build and push matrix
          NAMES=$(echo "$RAW" | jq -c '[keys[]]')
          echo "Container names: $NAMES"
          echo "names=$NAMES" >> $GITHUB_OUTPUT

  build:
    needs: discover
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        container: ${{ fromJSON(needs.discover.outputs.container-names) }}
        platform:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          system: ${{ matrix.platform.system }}
          hatchet: cleave
          enable-cachix: true
          cachix-name: ${{ env.CACHIX_BINARY_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Setup tmate debug session
        if: inputs.debug_enabled
        uses: mxschmitt/action-tmate@e5c7151931ca95bad1c6f4190c730ecf8c7dde48 # ratchet:mxschmitt/action-tmate@v3

      - name: Build ${{ matrix.container }} (${{ matrix.platform.system }})
        run: |
          echo "Building ${{ matrix.container }} (${{ matrix.platform.system }})"
          nix build ".#${{ matrix.container }}" -L

  push:
    needs: [discover, build]
    if: inputs.push
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        container: ${{ fromJSON(needs.discover.outputs.container-names) }}
        platform:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          system: ${{ matrix.platform.system }}
          hatchet: cleave
          enable-cachix: true
          cachix-name: ${{ env.CACHIX_BINARY_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Set git variables
        run: |
          echo "GIT_SHA=${{ github.sha }}" >> $GITHUB_ENV
          echo "GIT_SHA_SHORT=${GITHUB_SHA:0:7}" >> $GITHUB_ENV
          echo "GIT_REF=$(echo '${{ github.ref_name }}' | tr '/' '-')" >> $GITHUB_ENV

      - name: Push ${{ matrix.container }} (${{ matrix.platform.system }}) to registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Pushing ${{ matrix.container }} (${{ matrix.platform.system }}) to registry"
          nix run --impure ".#push-${{ matrix.container }}" -L

  manifest:
    needs: [discover, push]
    if: inputs.push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        container: ${{ fromJSON(needs.discover.outputs.container-names) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          installer: quick
          system: x86_64-linux

      - name: Set git variables
        run: |
          echo "GIT_SHA=${{ github.sha }}" >> $GITHUB_ENV
          echo "GIT_SHA_SHORT=${GITHUB_SHA:0:7}" >> $GITHUB_ENV
          echo "GIT_REF=$(echo '${{ github.ref_name }}' | tr '/' '-')" >> $GITHUB_ENV

      - name: Assemble ${{ matrix.container }} manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Assembling ${{ matrix.container }} manifest"
          nix run --impure ".#${{ matrix.container }}Manifest" -L
