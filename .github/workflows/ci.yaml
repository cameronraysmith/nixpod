name: "CI/CD"
on:
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: "Run the workflow with tmate.io debugging enabled"
        required: true
        type: boolean
        default: false
      run_build_images:
        description: "Run build-images job"
        required: false
        type: boolean
        default: false
      run_execute_workflow:
        description: "Run execute-workflow job"
        required: false
        type: boolean
        default: false
      force_run:
        description: "Force execution even if already successful for this commit"
        required: false
        type: boolean
        default: false
  pull_request:
    types: [opened, labeled, reopened, synchronize]
    paths-ignore:
      - "testing/**"
      - "**.md"
      - "*"
      - "!flake.nix"
      - "!flake.lock"
  push:
    branches:
      - "main"
      - "beta"
    paths-ignore:
      - "testing/**"
      - "**.md"
      - "*"
      - "!flake.nix"
      - "!flake.lock"

defaults:
  run:
    shell: bash

permissions:
  actions: write
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # ratchet:actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          installer: quick
          system: x86_64-linux
      - name: Scan for secrets with gitleaks
        run: nix run nixpkgs#gitleaks -- detect --verbose --redact


  set-variables:
    needs: [secrets-scan]
    runs-on: ubuntu-latest
    outputs:
      debug: ${{ steps.set-variables.outputs.debug }}
      skip_ci: ${{ steps.set-variables.outputs.skip_ci }}
      skip_tests: ${{ steps.set-variables.outputs.skip_tests }}
      checkout_ref: ${{ steps.set-variables.outputs.checkout_ref }}

    steps:
      - name: Set action variables
        id: set-variables
        run: |
          DEBUG="false"
          SKIP_CI="false"
          SKIP_TESTS="false"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            DEBUG="${{ inputs.debug_enabled }}"
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if ${{ contains(github.event.pull_request.labels.*.name, 'skip-ci') }}; then
              SKIP_CI="true"
            fi
            if ${{ contains(github.event.pull_request.labels.*.name, 'skip-tests') }}; then
              SKIP_TESTS="true"
            fi
            if ${{ contains(github.event.pull_request.labels.*.name, 'actions-debug') }}; then
              DEBUG="true"
            fi
            CHECKOUT_REF="${{ github.event.pull_request.head.ref }}"
          else
            CHECKOUT_REF="${{ github.ref }}"
          fi

          echo "DEBUG=$DEBUG"
          echo "SKIP_CI=$SKIP_CI"
          echo "SKIP_TESTS=$SKIP_TESTS"

          echo "DEBUG=$DEBUG" >> $GITHUB_OUTPUT
          echo "SKIP_CI=$SKIP_CI" >> $GITHUB_OUTPUT
          echo "SKIP_TESTS=$SKIP_TESTS" >> $GITHUB_OUTPUT
          echo "CHECKOUT_REF=$CHECKOUT_REF" >> $GITHUB_OUTPUT

  flake-check:
    runs-on: ubuntu-latest
    needs: [secrets-scan, set-variables]
    if: ${{ needs.set-variables.outputs.skip_ci != 'true' }}
    concurrency:
      group: flake-check-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # ratchet:actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check execution cache
        id: cache
        uses: ./.github/actions/cached-ci-job
        with:
          check-name: ${{ github.job }}
          hash-sources: 'flake.nix flake.lock modules/**/*.nix containers/**/*.nix home/**/*.nix .github/actions/setup-nix/action.yml'
          force-run: ${{ inputs.force_run && 'true' || 'false' }}
      - name: Setup Nix
        if: steps.cache.outputs.should-run == 'true'
        uses: ./.github/actions/setup-nix
        with:
          system: x86_64-linux
          enable-cachix: true
          cachix-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Configure system features
        if: steps.cache.outputs.should-run == 'true'
        run: |
          echo "system-features = nixos-test benchmark big-parallel kvm" | sudo tee -a /etc/nix/nix.conf
          sudo systemctl restart nix-daemon
      - name: Setup tmate debug session
        uses: mxschmitt/action-tmate@e5c7151931ca95bad1c6f4190c730ecf8c7dde48 # ratchet:mxschmitt/action-tmate@v3
        if: ${{ steps.cache.outputs.should-run == 'true' && inputs.debug_enabled }}
      - name: Summarize flake
        if: steps.cache.outputs.should-run == 'true'
        run: nix flake show
      - name: Run flake check
        if: steps.cache.outputs.should-run == 'true'
        run: nix develop --accept-flake-config -c just check
      - name: Create job result marker
        if: success() && steps.cache.outputs.should-run == 'true'
        shell: bash
        run: |
          mkdir -p "${{ steps.cache.outputs.cache-path }}"
          cat > "${{ steps.cache.outputs.cache-path }}/marker" <<MARKEREOF
          {
            "success": true,
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${{ github.sha }}",
            "cache_key": "${{ steps.cache.outputs.cache-key }}",
            "workflow_run_id": "${{ github.run_id }}"
          }
          MARKEREOF
      - name: Save job result to cache
        if: success() && steps.cache.outputs.should-run == 'true'
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # ratchet:actions/cache/save@v5
        with:
          path: ${{ steps.cache.outputs.cache-path }}
          key: ${{ steps.cache.outputs.cache-key }}

  build-nix-images:
    runs-on: ubuntu-latest
    needs: [set-variables]
    if: ${{ needs.set-variables.outputs.skip_ci != 'true' && ( contains(github.event.pull_request.labels.*.name, 'build-images') || contains(github.event.pull_request.labels.*.name, 'execute-workflow') || (github.event_name == 'workflow_dispatch' && inputs.run_build_images) || (github.event_name == 'workflow_dispatch' && inputs.run_execute_workflow) ) }}
    concurrency:
      group: bni-${{ matrix.image }}-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image: [nixpod, codenix, ghanix, jupnix]
      fail-fast: false
    env:
      NIX_IMAGE_SYSTEMS: x86_64-linux
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # ratchet:actions/checkout@v4
        with:
          ref: ${{ needs.set-variables.outputs.checkout_ref }}

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          system: x86_64-linux
          hatchet: cleave
          enable-cachix: true
          cachix-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Set git variables
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            GIT_SHA="${{ github.event.pull_request.head.sha }}"
          else
            GIT_SHA="${{ github.sha }}"
          fi
          echo "GIT_SHA=$GIT_SHA" >> $GITHUB_ENV
          echo "GIT_SHA_SHORT=${GIT_SHA:0:7}" >> $GITHUB_ENV
          echo "GIT_REF=$(echo '${{ github.ref_name }}' | tr '/' '-')" >> $GITHUB_ENV

      - name: Build and push ${{ matrix.image }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          nix run ".#${{ matrix.image }}Manifest" --impure --accept-flake-config --print-build-logs --show-trace
  release:
    runs-on: ubuntu-latest
    needs: [flake-check]
    if: ${{ github.repository_owner == 'cameronraysmith' && github.event_name == 'push' }}
    permissions:

      contents: write
    outputs:
      version: ${{ steps.semantic-release.outputs.new_release_version }}
      git-tag: ${{ steps.semantic-release.outputs.new_release_git_tag }}
      released: ${{ steps.semantic-release.outputs.new_release_published }}
      git-head: ${{ steps.semantic-release.outputs.new_release_git_head }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # ratchet:actions/checkout@v4
        with:
          fetch-depth: '0'
      - name: Get semantic-release version
        shell: sh
        id: semantic-release-version
        run: echo version=$(npm view @cihelper/semanticrelease-preset-generic dependencies.semantic-release) >> $GITHUB_OUTPUT
      - name: Run semantic-release

        id: semantic-release
        uses: cycjimmy/semantic-release-action@b1b432f13acb7768e0c8efdec416d363a57546f2 # ratchet:cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        with:
          semantic_version: ${{ steps.semantic-release-version.outputs.version }}
          extra_plugins: "@cihelper/semanticrelease-preset-generic@1"
          extends: "@cihelper/semanticrelease-preset-generic"

  publish-nix-images:
    runs-on: ubuntu-latest
    needs: [release]
    if: ${{ needs.release.outputs.released == 'true' }}
    concurrency:
      group: pni-${{ matrix.image }}-${{ github.workflow }}-${{ github.ref }}-${{ github.sha }}
      cancel-in-progress: true
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image: [nixpod, codenix, ghanix, jupnix]
    env:
      NIX_IMAGE_SYSTEMS: x86_64-linux
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # ratchet:actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.git-tag }}

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          system: x86_64-linux
          hatchet: cleave
          enable-cachix: true
          cachix-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Set git variables
        run: |
          TAG="${{ needs.release.outputs.git-tag }}"
          GIT_SHA=$(git rev-parse "$TAG")
          echo "GIT_SHA=$GIT_SHA" >> $GITHUB_ENV
          echo "GIT_SHA_SHORT=${GIT_SHA:0:7}" >> $GITHUB_ENV
          echo "GIT_REF=$(echo '${{ github.ref_name }}' | tr '/' '-')" >> $GITHUB_ENV

      - name: Build and push ${{ matrix.image }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          nix run ".#${{ matrix.image }}Manifest" --impure --accept-flake-config --print-build-logs --show-trace
