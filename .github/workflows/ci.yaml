name: "CI/CD"
on:
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: "Run the workflow with tmate.io debugging enabled"
        required: true
        type: boolean
        default: false
      run_build_images:
        description: "Run build-images job"
        required: false
        type: boolean
        default: false
      run_execute_workflow:
        description: "Run execute-workflow job"
        required: false
        type: boolean
        default: false
      force_run:
        description: "Force execution even if already successful for this commit"
        required: false
        type: boolean
        default: false
  pull_request:
    types: [opened, labeled, reopened, synchronize]
    paths-ignore:
      - "testing/**"
      - "**.md"
      - "*"
      - "!flake.nix"
      - "!flake.lock"
  push:
    branches:
      - "main"
      - "beta"
    paths-ignore:
      - "testing/**"
      - "**.md"
      - "*"
      - "!flake.nix"
      - "!flake.lock"

defaults:
  run:
    shell: bash

permissions:
  actions: write
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          installer: quick
          system: x86_64-linux
      - name: Scan for secrets with gitleaks
        run: nix run nixpkgs#gitleaks -- detect --verbose --redact


  set-variables:
    needs: [secrets-scan]
    runs-on: ubuntu-latest
    outputs:
      debug: ${{ steps.set-variables.outputs.debug }}
      skip_ci: ${{ steps.set-variables.outputs.skip_ci }}
      skip_tests: ${{ steps.set-variables.outputs.skip_tests }}
      checkout_ref: ${{ steps.set-variables.outputs.checkout_ref }}

    steps:
      - name: Set action variables
        id: set-variables
        run: |
          DEBUG="false"
          SKIP_CI="false"
          SKIP_TESTS="false"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            DEBUG="${{ inputs.debug_enabled }}"
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if ${{ contains(github.event.pull_request.labels.*.name, 'skip-ci') }}; then
              SKIP_CI="true"
            fi
            if ${{ contains(github.event.pull_request.labels.*.name, 'skip-tests') }}; then
              SKIP_TESTS="true"
            fi
            if ${{ contains(github.event.pull_request.labels.*.name, 'actions-debug') }}; then
              DEBUG="true"
            fi
            CHECKOUT_REF="${{ github.event.pull_request.head.ref }}"
          else
            CHECKOUT_REF="${{ github.ref }}"
          fi

          echo "DEBUG=$DEBUG"
          echo "SKIP_CI=$SKIP_CI"
          echo "SKIP_TESTS=$SKIP_TESTS"

          echo "DEBUG=$DEBUG" >> $GITHUB_OUTPUT
          echo "SKIP_CI=$SKIP_CI" >> $GITHUB_OUTPUT
          echo "SKIP_TESTS=$SKIP_TESTS" >> $GITHUB_OUTPUT
          echo "CHECKOUT_REF=$CHECKOUT_REF" >> $GITHUB_OUTPUT

  preview-release-version:
    needs: [secrets-scan]
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch target branch
        run: |
          git fetch origin
          git branch -f main origin/main

      - name: Configure git identity for temporary commits
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          installer: quick
          system: x86_64-linux

      - name: Install dependencies
        run: nix develop --accept-flake-config -c bun install

      - name: Preview release version
        id: preview
        run: |
          echo "::group::Preview semantic-release version"
          nix develop --accept-flake-config -c just preview-version main
          echo "::endgroup::"

      - name: Annotate release preview
        if: always() && steps.preview.outputs.release-pending != ''
        run: |
          VERSION="${{ steps.preview.outputs.next-version }}"
          PENDING="${{ steps.preview.outputs.release-pending }}"

          if [ "$PENDING" = "true" ] && [ -n "$VERSION" ]; then
            echo "::notice title=Release Preview::Next version would be $VERSION"
            echo "## Release Preview" >> "$GITHUB_STEP_SUMMARY"
            echo "Next version: **$VERSION**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::notice title=Release Preview::No release pending"
            echo "## Release Preview" >> "$GITHUB_STEP_SUMMARY"
            echo "No release pending" >> "$GITHUB_STEP_SUMMARY"
          fi

  flake-check:
    runs-on: ubuntu-latest
    needs: [secrets-scan, set-variables]
    if: ${{ needs.set-variables.outputs.skip_ci != 'true' }}
    concurrency:
      group: flake-check-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Check execution cache
        id: cache
        uses: ./.github/actions/cached-ci-job
        with:
          check-name: ${{ github.job }}
          hash-sources: 'flake.nix flake.lock modules/**/*.nix containers/**/*.nix .github/actions/setup-nix/action.yml'
          force-run: ${{ inputs.force_run && 'true' || 'false' }}
      - name: Setup Nix
        if: steps.cache.outputs.should-run == 'true'
        uses: ./.github/actions/setup-nix
        with:
          system: x86_64-linux
          enable-cachix: true
          cachix-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Configure system features
        if: steps.cache.outputs.should-run == 'true'
        run: |
          echo "system-features = nixos-test benchmark big-parallel kvm" | sudo tee -a /etc/nix/nix.conf
          sudo systemctl restart nix-daemon
      - name: Setup tmate debug session
        uses: mxschmitt/action-tmate@e5c7151931ca95bad1c6f4190c730ecf8c7dde48 # ratchet:mxschmitt/action-tmate@v3
        if: ${{ steps.cache.outputs.should-run == 'true' && inputs.debug_enabled }}
      - name: Summarize flake
        if: steps.cache.outputs.should-run == 'true'
        run: nix flake show
      - name: Run flake check
        if: steps.cache.outputs.should-run == 'true'
        run: nix develop --accept-flake-config -c just check
      - name: Create job result marker
        if: success() && steps.cache.outputs.should-run == 'true'
        shell: bash
        run: |
          mkdir -p "${{ steps.cache.outputs.cache-path }}"
          cat > "${{ steps.cache.outputs.cache-path }}/marker" <<MARKEREOF
          {
            "success": true,
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${{ github.sha }}",
            "cache_key": "${{ steps.cache.outputs.cache-key }}",
            "workflow_run_id": "${{ github.run_id }}"
          }
          MARKEREOF
      - name: Save job result to cache
        if: success() && steps.cache.outputs.should-run == 'true'
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # ratchet:actions/cache/save@v5
        with:
          path: ${{ steps.cache.outputs.cache-path }}
          key: ${{ steps.cache.outputs.cache-key }}

  build-nix-images:
    runs-on: ${{ matrix.platform.runner }}
    needs: [set-variables]
    if: ${{ needs.set-variables.outputs.skip_ci != 'true' && ( contains(github.event.pull_request.labels.*.name, 'build-images') || contains(github.event.pull_request.labels.*.name, 'execute-workflow') || (github.event_name == 'workflow_dispatch' && inputs.run_build_images) || (github.event_name == 'workflow_dispatch' && inputs.run_execute_workflow) ) }}
    concurrency:
      group: bni-${{ matrix.image }}-${{ matrix.platform.system }}-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [nixpod, codenix, ghanix, jupnix]
        platform:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.set-variables.outputs.checkout_ref }}

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          system: ${{ matrix.platform.system }}
          hatchet: cleave
          enable-cachix: true
          cachix-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Set git variables
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            GIT_SHA="${{ github.event.pull_request.head.sha }}"
          else
            GIT_SHA="${{ github.sha }}"
          fi
          echo "GIT_SHA=$GIT_SHA" >> $GITHUB_ENV
          echo "GIT_SHA_SHORT=${GIT_SHA:0:7}" >> $GITHUB_ENV
          echo "GIT_REF=$(echo '${{ github.ref_name }}' | tr '/' '-')" >> $GITHUB_ENV

      - name: Build and push ${{ matrix.image }} (${{ matrix.platform.system }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          nix run --impure ".#push-${{ matrix.image }}" --accept-flake-config --print-build-logs --show-trace

  publish-manifests:
    runs-on: ubuntu-latest
    needs: [set-variables, build-nix-images]
    if: ${{ needs.set-variables.outputs.skip_ci != 'true' && ( contains(github.event.pull_request.labels.*.name, 'build-images') || contains(github.event.pull_request.labels.*.name, 'execute-workflow') || (github.event_name == 'workflow_dispatch' && inputs.run_build_images) || (github.event_name == 'workflow_dispatch' && inputs.run_execute_workflow) ) }}
    concurrency:
      group: pm-${{ matrix.image }}-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [nixpod, codenix, ghanix, jupnix]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.set-variables.outputs.checkout_ref }}

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          installer: quick
          system: x86_64-linux

      - name: Set git variables
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            GIT_SHA="${{ github.event.pull_request.head.sha }}"
          else
            GIT_SHA="${{ github.sha }}"
          fi
          echo "GIT_SHA=$GIT_SHA" >> $GITHUB_ENV
          echo "GIT_SHA_SHORT=${GIT_SHA:0:7}" >> $GITHUB_ENV
          echo "GIT_REF=$(echo '${{ github.ref_name }}' | tr '/' '-')" >> $GITHUB_ENV

      - name: Assemble ${{ matrix.image }} manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          nix run --impure ".#${{ matrix.image }}Manifest" --accept-flake-config --print-build-logs

  release:
    runs-on: ubuntu-latest
    needs: [flake-check]
    if: ${{ github.repository_owner == 'cameronraysmith' && github.event_name == 'push' }}
    permissions:
      contents: write
    outputs:
      version: ${{ steps.release-info.outputs.new_release_version }}
      git-tag: ${{ steps.release-info.outputs.new_release_git_tag }}
      released: ${{ steps.release-info.outputs.new_release_published }}
      git-head: ${{ steps.release-info.outputs.new_release_git_head }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: '0'
      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          installer: quick
          system: x86_64-linux
      - name: Install dependencies
        run: nix develop --accept-flake-config -c bun install
      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix develop --accept-flake-config -c just release
      - name: Extract release info
        id: release-info
        if: always()
        run: |
          TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | sort -V | tail -1)
          if [ -n "$TAG" ]; then
            VERSION="${TAG#v}"
            echo "new_release_version=$VERSION" >> $GITHUB_OUTPUT
            echo "new_release_git_tag=$TAG" >> $GITHUB_OUTPUT
            echo "new_release_published=true" >> $GITHUB_OUTPUT
            echo "new_release_git_head=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          else
            echo "new_release_published=false" >> $GITHUB_OUTPUT
          fi

  publish-nix-images:
    runs-on: ${{ matrix.platform.runner }}
    needs: [release]
    if: ${{ needs.release.outputs.released == 'true' }}
    concurrency:
      group: pni-${{ matrix.image }}-${{ matrix.platform.system }}-${{ github.workflow }}-${{ github.ref }}-${{ github.sha }}
      cancel-in-progress: true
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [nixpod, codenix, ghanix, jupnix]
        platform:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.release.outputs.git-tag }}

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          system: ${{ matrix.platform.system }}
          hatchet: cleave
          enable-cachix: true
          cachix-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Set git variables
        run: |
          TAG="${{ needs.release.outputs.git-tag }}"
          GIT_SHA=$(git rev-parse "$TAG")
          echo "GIT_SHA=$GIT_SHA" >> $GITHUB_ENV
          echo "GIT_SHA_SHORT=${GIT_SHA:0:7}" >> $GITHUB_ENV
          echo "GIT_REF=$(echo '${{ github.ref_name }}' | tr '/' '-')" >> $GITHUB_ENV

      - name: Build and push ${{ matrix.image }} (${{ matrix.platform.system }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          nix run --impure ".#push-${{ matrix.image }}" --accept-flake-config --print-build-logs --show-trace

  publish-manifests-release:
    runs-on: ubuntu-latest
    needs: [release, publish-nix-images]
    if: ${{ needs.release.outputs.released == 'true' }}
    concurrency:
      group: pmr-${{ matrix.image }}-${{ github.workflow }}-${{ github.ref }}-${{ github.sha }}
      cancel-in-progress: true
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [nixpod, codenix, ghanix, jupnix]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.release.outputs.git-tag }}

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          installer: quick
          system: x86_64-linux

      - name: Set git variables
        run: |
          TAG="${{ needs.release.outputs.git-tag }}"
          GIT_SHA=$(git rev-parse "$TAG")
          echo "GIT_SHA=$GIT_SHA" >> $GITHUB_ENV
          echo "GIT_SHA_SHORT=${GIT_SHA:0:7}" >> $GITHUB_ENV
          echo "GIT_REF=$(echo '${{ github.ref_name }}' | tr '/' '-')" >> $GITHUB_ENV

      - name: Assemble ${{ matrix.image }} manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          nix run --impure ".#${{ matrix.image }}Manifest" --accept-flake-config --print-build-logs
