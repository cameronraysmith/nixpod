shared:
  base_conditions: &base_conditions
    - label!=work-in-progress
    - -draft
    - -conflict

  required_checks: &required_checks
    - check-success=secrets-scan
    - check-success=set-variables
    - check-success=check-fast-forward
    - or:
        - check-success=flake-check
        - check-skipped=flake-check
    - or:
        - check-success=preview-release-version
        - check-skipped=preview-release-version
    - "check-success=build-nix-images (nixpod, x86_64-linux, ubuntu-latest)"
    - "check-success=build-nix-images (nixpod, aarch64-linux, ubuntu-24.04-arm)"
    - "check-success=build-nix-images (codenix, x86_64-linux, ubuntu-latest)"
    - "check-success=build-nix-images (codenix, aarch64-linux, ubuntu-24.04-arm)"
    - "check-success=build-nix-images (ghanix, x86_64-linux, ubuntu-latest)"
    - "check-success=build-nix-images (ghanix, aarch64-linux, ubuntu-24.04-arm)"
    - "check-success=build-nix-images (jupnix, x86_64-linux, ubuntu-latest)"
    - "check-success=build-nix-images (jupnix, aarch64-linux, ubuntu-24.04-arm)"
    - "check-success=publish-manifests (nixpod)"
    - "check-success=publish-manifests (codenix)"
    - "check-success=publish-manifests (ghanix)"
    - "check-success=publish-manifests (jupnix)"

  human_author_conditions: &human_author_conditions
    - author!=renovate[bot]
    - author!=mergify[bot]
    - author!=github-actions[bot]
    - "author!=vanixiets-flake-updater[bot]"
    - label!=flake-update

  bot_author_conditions: &bot_author_conditions
    - or:
        - author=renovate[bot]
        - author=mergify[bot]
        - author=github-actions[bot]
        - "author=vanixiets-flake-updater[bot]"
        - label=flake-update

pull_request_rules:
  - name: self-assign PRs
    conditions:
      - -merged
      - -closed
      - "#assignee=0"
    actions:
      assign:
        add_users:
          - "{{ author }}"

  - name: queue human PRs
    conditions:
      - "#approved-reviews-by>=1"
      - and: *base_conditions
      - and: *human_author_conditions
      - and: *required_checks
    actions:
      queue:
        name: default

  - name: queue bot PRs
    conditions:
      - "#approved-reviews-by>=1"
      - and: *base_conditions
      - and: *bot_author_conditions
      - and: *required_checks
    actions:
      queue:
        name: bot-updates

queue_rules:
  - name: default
    merge_method: rebase
    update_method: rebase
    update_bot_account: cameronraysmith
    batch_size: 1
    checks_timeout: 1 h
    queue_conditions:
      - -conflict
    merge_conditions:
      - and: *required_checks

  - name: bot-updates
    merge_method: rebase
    update_method: rebase
    update_bot_account: cameronraysmith
    batch_size: 10
    batch_max_wait_time: 5 min
    checks_timeout: 1 h
    queue_conditions:
      - -conflict
    merge_conditions:
      - and: *required_checks
